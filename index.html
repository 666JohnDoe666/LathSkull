<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<title>LathSkull</title>

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">


<style>

html {
    background: #0a0a0a;
}

body {
    margin: 0;
    background-image: url("arkaplan.jpg");
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    background-attachment: scroll;
    color: #ddd;
    text-align: center;
}


/* Üst bölüm */

header{

    padding-top:40px;

}


.logo{

    width:650px;
    max-width:90%;

    display:block;

    margin:0 auto 25px;

}



p{

    font-family:'Cinzel',serif;

    font-size:35px;

    margin-top:40px;
    margin-bottom:30px;

    letter-spacing:2px;

    font-weight:500;

}



/* Fotoğraf kutuları */

.showcase{

    display:flex;

    justify-content:center;

    gap:30px;

    flex-wrap:wrap;

    margin-bottom:20px;

}



.box{

    display:block;

    width:450px;

    overflow:hidden;

    border:2px solid #444;

}



.box img{

    width:100%;

    display:block;

    transition:.3s;

}



.box:hover img{

    transform:scale(1.05);

    filter:brightness(1.15);

}


/* Çalışmalarım butonu */

.work-img{

    width:400px;

    max-width:90%;

    margin-top:20px;

    transition:.3s;

}



.work-img:hover{

    transform:scale(1.08);

    filter:brightness(1.3);

}



/* Bölümler */
.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    margin-top:50px;
}

.gallery img{
    width:320px;
    max-width:90%;
    border:2px solid #444;
    transition:.3s;
    filter:grayscale(100%);
}

.gallery img:hover{
    filter:grayscale(0%);
    transform:scale(1.03);
}

section{

    padding:150px 20px;

    min-height:500px;

}



section h1{

    font-family:'Cinzel',serif;

    font-size:42px;

}



</style>


</head>


<body>


<header>


<img src="lathskull.png" alt="LathSkull Logo" class="logo">



<p>

El İşçiliği Gravürlü Kafatasları,<br>

Motosiklet Süslemeleri ve Gotik Tasarımlar

</p>




<div class="showcase">



<a href="#kafalar" class="box">

<img src="kafa.jpg" alt="Kafatasları">

</a>



<a href="#motorlar" class="box">

<img src="motor.jpg" alt="Motorlar">

</a>



</div>





<a href="#galeri">

<img src="calismalarim.png" alt="Çalışmalarımı Gör" class="work-img">

</a>



</header>





<section id="kafalar">

<h1>Kafatası Çalışmaları</h1>

<div class="gallery">

    <img src="kafa1.jpg" alt="Kafatası">
    <img src="kafa2.jpg" alt="Kafatası">
    <img src="kafa3.jpg" alt="Kafatası">

</div>

</section>






<section id="motorlar">

<h1>Motosiklet Gravürleri</h1>

<div class="gallery">

    <img src="motor1.jpg" alt="Motosiklet Gravürü">
    <img src="motor2.jpg" alt="Motosiklet Gravürü">
    <img src="motor3.jpg" alt="Motosiklet Gravürü">

</div>

</section>






<section id="galeri">

<h1>Tüm Çalışmalar</h1>

<div class="gallery">

    <img src="calisma1.jpg" alt="Çalışma">
    <img src="calisma2.jpg" alt="Çalışma">
    <img src="calisma3.jpg" alt="Çalışma">
    <img src="calisma3.jpg" alt="Çalışma">
</div>

</section>




</body>

</html>
