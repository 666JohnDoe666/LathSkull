<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<title>LathSkull</title>

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #0a0a0a;
    color: #ddd;
    font-family: Arial, sans-serif;
    text-align: center;
}


/* Üst bölüm */
header {
    padding-top: 40px;
}


.logo {
    width: 650px;
    height: auto;
    display: block;
    margin: 0 auto 25px;
}


p {
    font-family:'Cinzel', serif;
    font-size:35px;
    margin-top:40px;
    margin-bottom:10px;
    letter-spacing:2px;
    font-weight:500;
}


/* Çalışmalarımı Gör butonu */
.work-img {
    width: 400px;
    height: auto;
    margin-top: 20px;
    transition: 0.3s;
}


.work-img:hover {
    transform: scale(1.08);
    filter: brightness(1.3);
}


</style>

</head>


<body>

<header>

<img src="./lathskull.png" alt="LathSkull Logo" class="logo">


<p>
El İşçiliği Gravürlü Kafatasları,<br>
Motosiklet Süslemeleri ve Gotik Tasarımlar
</p>


<div class="showcase">

<a href="#kafalar" class="box">
    <img src="./kafa.jpg" alt="Kafatasları">
</a>

<a href="#motorlar" class="box">
    <img src="./motor.jpg" alt="Motorlar">
</a>

</div>

<a href="#galeri">
    <img src="./calismalarim.png" alt="Çalışmalarımı Gör" class="work-img">
</a>


</header>

</body>

</html>
