<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LathSkull</title>

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

html {
    background: #0a0a0a;
    scroll-behavior: smooth;
}

body {
    margin: 0;
    text-align: center;
    color: #ddd;

    background-image: url("arkaplandesktop.png");
    background-size: cover;
    background-position: center -32px;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* INTRO */
.intro {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: introFade 1.8s ease forwards;
}

.intro-logo {
    width: 300px;
    opacity: 0;
    transform: scale(0.85);
    animation: logoIn 1.2s ease forwards;
}

@keyframes logoIn {
    0% {
        opacity: 0;
        transform: scale(0.85);
        filter: blur(10px);
    }
    100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
    }
}

@keyframes introFade {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

/* HEADER */

header {
    padding-top: 40px;
    text-align: center;
}

.logo{
    width:650px;
    max-width:90%;
    display:block;
    margin:0 auto 25px;
}

p{
    font-family:'Cinzel',serif;
    font-size:35px;
    margin-top:40px;
    margin-bottom:30px;
    letter-spacing:2px;
    font-weight:500;
    text-align:center;
    color:#ddd;
}

/* SHOWCASE SPLIT FRAME */

.showcase{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

.split-frame {
    position: relative;
    width: 650px;
}

.split-frame .half {
    position: absolute;
    top: 12%;
    width: 42%;
    height: 76%;
    overflow: hidden;
}

.split-frame .left {
    left: 8%;
}

.split-frame .right {
    right: 8%;
}

.split-frame .half img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.frame-overlay {
    width: 100%;
    display: block;
    position: relative;
    z-index: 10;
    pointer-events: none;
}

/* WORK BUTTON */

.work-img{
    width:420px;
    max-width:90%;
    margin-top:0px;
    transition:.3s;
}

.work-img:hover{
    transform:scale(1.08);
    filter:brightness(1.3);
}

/* GALLERY */

.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    margin-top:50px;
}

.gallery img{
    width:320px;
    max-width:90%;
    border:2px solid #444;
    transition:.3s;
    filter:grayscale(100%);
}

.gallery img:hover{
    filter:grayscale(0%);
    transform:scale(1.03);
}

section{
    padding:150px 20px;
    min-height:500px;
}

section h1{
    font-family:'Cinzel',serif;
    font-size:42px;
}

/* MOBILE */

@media (max-width: 768px) {

    body {
        background-image: url("arkaplanmobile.jpg");
        background-size: cover;
        background-position: center top;
        background-repeat: no-repeat;
        background-attachment: scroll;
    }

    .logo {
        width: 90%;
        max-width: 420px;
        margin-bottom: 10px;
    }

    p {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.2;
        padding: 0 15px;
        letter-spacing: 0.5px;
    }

    header {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding-top: 60px;
    }

    .split-frame {
        width: 90%;
    }
}

</style>

</head>

<body>

<!-- INTRO -->
<div class="intro">
    <img src="lathskull.png" class="intro-logo">
</div>

<header>

<img src="lathskull.png" class="logo">

<p>
El İşçiliği Gravürlü Kafatasları,<br>
Motosiklet Süslemeleri ve Gotik Tasarımlar
</p>

<div class="showcase">

    <a href="#motorlar" class="split-frame">

        <div class="half left">
            <img src="motor.jpg">
        </div>

        <div class="half right">
            <img src="kafa.jpg">
        </div>

        <img src="cerceve.png" class="frame-overlay">

    </a>

</div>

<a href="#galeri">
<img src="calismalarim.png" class="work-img">
</a>

</header>

<section id="kafalar">
<h1>Kafatası Çalışmaları</h1>
<div class="gallery">
    <img src="kafa1.jpg">
    <img src="kafa2.jpg">
    <img src="kafa3.jpg">
</div>
</section>

<section id="motorlar">
<h1>Motosiklet Gravürleri</h1>
<div class="gallery">
    <img src="motor1.jpg">
    <img src="motor2.jpg">
    <img src="motor3.jpg">
</div>
</section>

<section id="galeri">
<h1>Tüm Çalışmalar</h1>
<div class="gallery">
    <img src="calisma1.jpg">
    <img src="calisma2.jpg">
    <img src="calisma3.jpg">
    <img src="calisma3.jpg">
</div>
</section>

</body>
</html>
